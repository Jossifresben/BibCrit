services:
  - type: web
    name: bibcrit
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ANTHROPIC_API_KEY
        sync: false
      # Monthly Claude spend cap in USD (default: 5.0). Increase to allow more analyses per month.
      - key: BIBCRIT_API_CAP_USD
        value: "5.0"
